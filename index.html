<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rita's Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- ████████████████████████████████████████████████████████
     ИНСТРУКЦИЯ ПО НАСТРОЙКЕ:

     1. Перейди на https://console.firebase.google.com
     2. Создай новый проект (название любое)
     3. В проекте: Build → Realtime Database → Create Database
        Выбери регион Europe-west1, начни в Test mode (можно потом ограничить)
     4. В Project Settings (шестерёнка) → General → Your apps → Web (</>)
        Зарегистрируй приложение, скопируй firebaseConfig
     5. Вставь значения ниже вместо REPLACE_WITH_YOUR_...

     После этого загрузи HTML на любой хостинг (GitHub Pages, Netlify,
     Vercel — все бесплатные) или просто отправь файл девушке.
     Данные будут общими у всех кто откроет страницу.
     ████████████████████████████████████████████████████████ -->

<script>
  var FIREBASE_CONFIG = {
    apiKey:            "REPLACE_WITH_YOUR_API_KEY",
    authDomain:        "REPLACE_WITH_YOUR_AUTH_DOMAIN",
    databaseURL:       "REPLACE_WITH_YOUR_DATABASE_URL",
    projectId:         "REPLACE_WITH_YOUR_PROJECT_ID",
    storageBucket:     "REPLACE_WITH_YOUR_STORAGE_BUCKET",
    messagingSenderId: "REPLACE_WITH_YOUR_MESSAGING_SENDER_ID",
    appId:             "REPLACE_WITH_YOUR_APP_ID"
  };
</script>

<style>
:root {
  --bg:      #0C0C10;
  --surface: #13131A;
  --panel:   #18181F;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text:    #D8D4CC;
  --dim:     #6B6B7A;
  --accent:  #5B8DEF;
  --green:   #4CAF7D;
  --danger:  #C0544A;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* ── SETUP BANNER ── */
.setup-banner {
  background: rgba(226, 169, 107, 0.1);
  border-bottom: 1px solid rgba(226,169,107,.25);
  padding: 12px 40px;
  font-size: .8rem;
  color: #E2A96B;
  display: flex;
  align-items: center;
  gap: 10px;
}
.setup-banner a { color: inherit; text-decoration: underline; }
.setup-banner.hidden { display: none; }

/* ── HEADER ── */
.site-header {
  padding: 36px 40px 0;
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
}
.site-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.02em;
  line-height: 1;
}
.site-title span { color: var(--accent); }
.site-sub {
  font-family: 'Syne', sans-serif;
  font-size: .68rem; font-weight: 600;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--dim); margin-top: 6px;
}
.header-stat { text-align: right; flex-shrink: 0; }
.header-stat .big {
  font-family: 'Syne', sans-serif;
  font-size: 2rem; font-weight: 800;
  color: #fff; line-height: 1;
}
.header-stat .lbl { font-size: .68rem; letter-spacing: .15em; text-transform: uppercase; color: var(--dim); margin-top: 3px; }
.prog-line { width: 140px; height: 2px; background: var(--border2); border-radius: 2px; margin-top: 8px; margin-left: auto; overflow: hidden; }
.prog-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .6s ease; }

/* ── NAV ── */
.site-nav {
  max-width: 1200px; margin: 0 auto;
  padding: 28px 40px 0;
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
}
.nav-tab {
  font-family: 'Syne', sans-serif;
  font-size: .72rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--dim); background: none; border: none;
  border-bottom: 2px solid transparent;
  padding: 12px 20px 12px 0; margin-bottom: -1px;
  cursor: pointer; transition: color .2s, border-color .2s;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.on { color: #fff; border-bottom-color: var(--accent); }

/* ── MAIN ── */
.main { max-width: 1200px; margin: 0 auto; padding: 32px 40px 60px; }

@media (max-width: 640px) {
  .setup-banner { padding: 10px 20px; }
  .site-header { padding: 24px 20px 0; flex-direction: column; align-items: flex-start; }
  .header-stat { text-align: left; }
  .prog-line { margin-left: 0; }
  .site-nav { padding: 18px 20px 0; }
  .main { padding: 24px 20px 50px; }
}

.panel { display: none; }
.panel.on { display: block; animation: appear .2s ease; }
@keyframes appear { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ── LOADING ── */
.loading-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 14px; min-height: 320px;
  color: var(--dim); font-size: .88rem; letter-spacing: .05em;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SECTION ── */
.sec-head {
  display: flex; align-items: baseline; gap: 12px;
  margin: 36px 0 16px;
}
.sec-head:first-child { margin-top: 0; }
.sec-name {
  font-family: 'Syne', sans-serif;
  font-size: .65rem; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--dim); white-space: nowrap;
}
.sec-line { flex: 1; height: 1px; background: var(--border); }
.sec-count {
  font-family: 'Syne', sans-serif;
  font-size: .6rem; font-weight: 600;
  color: var(--dim); opacity: .6; white-space: nowrap;
}

/* ── GAME GRID ── */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
  gap: 10px;
}

/* CARD */
.gcard {
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  display: flex; flex-direction: column;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  position: relative;
}

/* Unowned = desaturated */
.gcard:not(.owned) .gcover { filter: grayscale(1) brightness(.7); }
.gcard:not(.owned) .gname { color: var(--dim); }
.gcard:not(.owned) { border-color: var(--border); opacity: .75; }
.gcard:not(.owned):hover {
  opacity: 1;
  border-color: var(--border2);
  transform: translateY(-2px);
}
.gcard:not(.owned):hover .gcover { filter: grayscale(.5) brightness(.85); }

/* Owned = color + green border */
.gcard.owned {
  border-color: rgba(76, 175, 125, 0.45);
  box-shadow: 0 0 0 1px rgba(76,175,125,.15), 0 8px 24px rgba(0,0,0,.35);
  opacity: 1;
}
.gcard.owned:hover {
  border-color: var(--green);
  transform: translateY(-2px);
  box-shadow: 0 0 0 1px rgba(76,175,125,.3), 0 12px 32px rgba(0,0,0,.4);
}
.gcard.owned .gcover { filter: none; }
.gcard.owned .gname { color: #fff; }

.gcover {
  width: 100%; aspect-ratio: 3/4;
  overflow: hidden; background: var(--panel);
  position: relative; flex-shrink: 0;
  transition: filter .3s;
}
.gcover img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: transform .35s;
}
.gcard:hover .gcover img { transform: scale(1.05); }

.gph {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  background: var(--panel);
}
.gph-icon { font-size: 1.5rem; opacity: .25; }
.gph-name {
  font-family: 'Syne', sans-serif;
  font-size: .46rem; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--dim); text-align: center;
  padding: 0 8px; line-height: 1.5; opacity: .6;
}

/* Owned checkmark badge */
.owned-badge {
  position: absolute; top: 7px; right: 7px;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--green);
  display: none; align-items: center; justify-content: center;
  font-size: .65rem; font-weight: 700; color: #fff;
  box-shadow: 0 2px 8px rgba(76,175,125,.4);
}
.gcard.owned .owned-badge { display: flex; }

.ginfo { padding: 9px 10px 10px; display: flex; flex-direction: column; gap: 4px; border-top: 1px solid var(--border); }
.gname { font-family: 'Syne', sans-serif; font-size: .7rem; font-weight: 700; color: var(--dim); line-height: 1.3; transition: color .2s; }
.gmeta { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.gyear { font-size: .6rem; color: var(--dim); font-weight: 300; opacity: .7; }
.gplat {
  font-size: .52rem; color: var(--dim);
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 5px;
  font-family: 'Syne', sans-serif; font-weight: 600;
}

/* ── ADMIN ── */
.adm-grid { display: flex; flex-direction: column; gap: 22px; }
.adm-block { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px 24px; }
.adm-title {
  font-family: 'Syne', sans-serif;
  font-size: .66rem; font-weight: 700;
  letter-spacing: .15em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 18px;
  padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.adm-search {
  width: 100%; background: var(--bg);
  border: 1px solid var(--border2); border-radius: 6px;
  color: var(--text); font-family: 'Outfit', sans-serif;
  font-size: .88rem; padding: 9px 14px; outline: none;
  margin-bottom: 14px; transition: border-color .2s;
}
.adm-search:focus { border-color: var(--accent); }
.adm-search::placeholder { color: var(--dim); opacity: .5; }
.adm-list { display: flex; flex-direction: column; gap: 6px; max-height: 420px; overflow-y: auto; padding-right: 4px; }
.adm-list::-webkit-scrollbar { width: 3px; }
.adm-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.adm-row { display: flex; align-items: center; gap: 11px; padding: 9px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--panel); transition: border-color .15s; }
.adm-row:hover { border-color: var(--border2); }

.adm-thumb {
  width: 32px; height: 43px; border-radius: 4px; background: var(--bg);
  flex-shrink: 0; overflow: hidden; border: 1px solid var(--border2);
  position: relative; display: flex; align-items: center; justify-content: center;
  font-size: .9rem; color: var(--dim);
}
.adm-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

.adm-inf { flex: 1; min-width: 0; }
.adm-name { font-family: 'Syne', sans-serif; font-size: .78rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.adm-sub { font-size: .62rem; color: var(--dim); margin-top: 2px; font-weight: 300; }

.adm-acts { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* Toggle */
.tog { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
.tog input { display: none; }
.tog-track { width: 30px; height: 16px; border-radius: 999px; background: var(--bg); border: 1px solid var(--border2); position: relative; flex-shrink: 0; transition: background .2s, border-color .2s; }
.tog-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 10px; height: 10px; border-radius: 50%; background: var(--dim); transition: all .2s; }
.tog input:checked ~ .tog-track { background: rgba(76,175,125,.15); border-color: var(--green); }
.tog input:checked ~ .tog-track::after { transform: translateX(14px); background: var(--green); }
.tog-lbl { font-size: .63rem; color: var(--dim); font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: .05em; }

.btn-url {
  background: none; border: 1px solid var(--border2);
  color: var(--dim); border-radius: 4px;
  padding: 3px 8px; font-size: .62rem; cursor: pointer;
  font-family: 'Syne', sans-serif; font-weight: 600;
  letter-spacing: .04em; transition: all .15s; white-space: nowrap;
}
.btn-url:hover { border-color: var(--accent); color: var(--accent); }
.btn-url.has-cover { border-color: rgba(76,175,125,.4); color: var(--green); }
.btn-url.has-cover:hover { border-color: var(--green); }

.btn-del { background: none; border: 1px solid rgba(192,84,74,.2); color: rgba(192,84,74,.6); border-radius: 4px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: .72rem; cursor: pointer; transition: all .15s; flex-shrink: 0; }
.btn-del:hover { border-color: var(--danger); color: var(--danger); background: rgba(192,84,74,.07); }

/* ADD FORM */
.add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 520px) { .add-grid { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-family: 'Syne', sans-serif; font-size: .6rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); }
.field input, .field select { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: .88rem; padding: 9px 12px; outline: none; transition: border-color .2s; }
.field input:focus, .field select:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--dim); opacity: .5; }
.field select option { background: #1a1a22; }
.field.span2 { grid-column: 1 / -1; }

.btn-add { margin-top: 14px; font-family: 'Syne', sans-serif; font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 10px 22px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; transition: opacity .2s, transform .15s; }
.btn-add:hover { opacity: .85; transform: translateY(-1px); }

/* DANGER */
.danger-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-dng { font-family: 'Syne', sans-serif; font-size: .63rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 8px 16px; background: transparent; color: rgba(192,84,74,.7); border: 1px solid rgba(192,84,74,.22); border-radius: 6px; cursor: pointer; transition: all .2s; }
.btn-dng:hover { color: var(--danger); border-color: var(--danger); background: rgba(192,84,74,.06); }

/* URL MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.modal-overlay.hidden { display: none; }
.modal { background: var(--panel); border: 1px solid var(--border2); border-radius: 12px; padding: 28px; width: 100%; max-width: 460px; }
.modal-title { font-family: 'Syne', sans-serif; font-size: .72rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--dim); margin-bottom: 18px; }
.modal-game { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 18px; }
.modal-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: .9rem; padding: 10px 14px; outline: none; margin-bottom: 8px; transition: border-color .2s; }
.modal-input:focus { border-color: var(--accent); }
.modal-input::placeholder { color: var(--dim); opacity: .5; }
.modal-preview { width: 100%; aspect-ratio: 4/3; border-radius: 6px; overflow: hidden; background: var(--bg); border: 1px solid var(--border); margin-bottom: 18px; display: flex; align-items: center; justify-content: center; }
.modal-preview img { width: 100%; height: 100%; object-fit: contain; display: none; }
.modal-preview .no-prev { font-size: .78rem; color: var(--dim); opacity: .5; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
.modal-save { font-family: 'Syne', sans-serif; font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 9px 20px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; transition: opacity .2s; }
.modal-save:hover { opacity: .85; }
.modal-clear { font-family: 'Syne', sans-serif; font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 9px 16px; background: transparent; color: var(--dim); border: 1px solid var(--border2); border-radius: 6px; cursor: pointer; transition: all .2s; }
.modal-clear:hover { color: var(--danger); border-color: rgba(192,84,74,.4); }
.modal-cancel { font-family: 'Syne', sans-serif; font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 9px 16px; background: transparent; color: var(--dim); border: none; cursor: pointer; }
.modal-cancel:hover { color: var(--text); }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; z-index: 200; background: var(--panel); border: 1px solid var(--border2); border-radius: 8px; padding: 11px 18px; font-size: .82rem; color: var(--text); font-weight: 500; box-shadow: 0 8px 32px rgba(0,0,0,.5); pointer-events: none; opacity: 0; transform: translateY(6px); transition: all .25s; }
.toast.show { opacity: 1; transform: none; }

.empty-state { text-align: center; padding: 20px; color: var(--dim); font-size: .82rem; }
</style>
</head>
<body>

<!-- Setup warning -->
<div class="setup-banner" id="setup-banner">
  ⚠️ Firebase не настроен. Следуй инструкции в HTML-файле, чтобы данные были общими.
  До настройки всё работает локально.
</div>

<header class="site-header">
  <div>
    <div class="site-title">Rita's <span>Collection</span></div>
    <div class="site-sub">Sonic the Hedgehog Universe</div>
  </div>
  <div class="header-stat">
    <div class="big"><span id="h-owned">0</span> / <span id="h-total">0</span></div>
    <div class="lbl">игр имеется</div>
    <div class="prog-line"><div class="prog-fill" id="h-bar" style="width:0%"></div></div>
  </div>
</header>

<nav class="site-nav">
  <button class="nav-tab on" data-t="col">Коллекция</button>
  <button class="nav-tab" data-t="adm">Управление</button>
</nav>

<main class="main">
  <div class="panel on" id="p-col">
    <div id="groot">
      <div class="loading-state"><div class="spinner"></div><span>Загружаем коллекцию...</span></div>
    </div>
  </div>
  <div class="panel" id="p-adm">
    <div class="adm-grid">
      <div class="adm-block">
        <div class="adm-title">Список игр</div>
        <input class="adm-search" id="asearch" type="text" placeholder="Поиск...">
        <div class="adm-list" id="alist"></div>
      </div>
      <div class="adm-block">
        <div class="adm-title">Добавить игру</div>
        <div class="add-grid">
          <div class="field"><label>Название</label><input id="fn" type="text" placeholder="Sonic the Hedgehog"></div>
          <div class="field"><label>Год</label><input id="fy" type="text" placeholder="1991"></div>
          <div class="field"><label>Платформа</label><input id="fp" type="text" placeholder="Genesis, PS4..."></div>
          <div class="field">
            <label>Раздел</label>
            <select id="fs">
              <option value="genesis">Genesis</option>
              <option value="dreamcast">Dreamcast</option>
              <option value="7thgen">7-е поколение</option>
              <option value="modern">Современные</option>
              <option value="remaster">Ремастеры</option>
              <option value="gamegear">Game Gear</option>
              <option value="gba">GBA</option>
              <option value="ds">DS / 3DS</option>
              <option value="wii">Wii</option>
              <option value="racing">Гонки</option>
              <option value="mania">Mania</option>
              <option value="mobile">Мобильные</option>
              <option value="other">Другое</option>
            </select>
          </div>
          <div class="field span2"><label>URL обложки (необязательно)</label><input id="furl" type="text" placeholder="https://..."></div>
        </div>
        <button class="btn-add" id="badd">Добавить</button>
      </div>
      <div class="adm-block">
        <div class="adm-title">Сброс данных</div>
        <div class="danger-row">
          <button class="btn-dng" id="bro">Сбросить галочки</button>
          <button class="btn-dng" id="bra">Сбросить всё</button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- URL Cover Modal -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <div class="modal-title">Обложка игры</div>
    <div class="modal-game" id="modal-gname"></div>
    <input class="modal-input" id="modal-url" type="text" placeholder="https://example.com/cover.jpg">
    <div class="modal-preview">
      <img id="modal-preview-img" alt="preview">
      <div class="no-prev" id="modal-no-prev">Введи URL для предпросмотра</div>
    </div>
    <div class="modal-btns">
      <button class="modal-clear" id="modal-clear">Удалить обложку</button>
      <button class="modal-cancel" id="modal-cancel">Отмена</button>
      <button class="modal-save" id="modal-save">Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

  {id:'sp6',  name:'Team Sonic Racing',             year:'2019', plat:'Multi',     sec:'racing',    coverUrl:''},
  {id:'ind1', name:'Sonic Mania',                   year:'2017', plat:'Multi',     sec:'mania',     coverUrl:''},
  {id:'ind2', name:'Sonic Mania Plus',              year:'2018', plat:'Multi',     sec:'mania',     coverUrl:''},
  {id:'mob1', name:'Sonic Dash',                    year:'2013', plat:'Mobile',    sec:'mobile',    coverUrl:''},
  {id:'mob2', name:'Sonic Forces: Speed Battle',    year:'2017', plat:'Mobile',    sec:'mobile',    coverUrl:''},
  {id:'mob3', name:'Sonic Jump',                    year:'2012', plat:'Mobile',    sec:'mobile',    coverUrl:''}

var SEC_LABEL = {
  genesis:'Sega Genesis', dreamcast:'Dreamcast / GameCube', '7thgen':'7th Gen Consoles',
  modern:'Modern', remaster:'Remasters', gamegear:'Game Gear', gba:'Game Boy Advance',
  ds:'DS / 3DS', wii:'Wii', racing:'Racing & Spin-offs', mania:'Sonic Mania',
  mobile:'Mobile', other:'Other'
};
var SEC_ORDER = ['genesis','dreamcast','7thgen','modern','remaster','gamegear','gba','ds','wii','racing','mania','mobile','other'];

// ── FIREBASE INIT ─────────────────────────────────────────────────────────
var firebaseReady = false;
var dbRef = null;

var isConfigured = FIREBASE_CONFIG.apiKey !== 'REPLACE_WITH_YOUR_API_KEY';

if (isConfigured) {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    dbRef = firebase.database();
    firebaseReady = true;
    document.getElementById('setup-banner').classList.add('hidden');
  } catch(e) {
    console.warn('Firebase init failed, using local mode', e);
  }
}

// ── LOCAL FALLBACK ────────────────────────────────────────────────────────
function lsGet(k, d) { try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return d; } }
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

// ── STATE (in-memory, kept in sync) ──────────────────────────────────────
var games = [];   // array
var owned = {};   // {id: true}

// ── TOAST ─────────────────────────────────────────────────────────────────
var _tt = null;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(function() { el.classList.remove('show'); }, 2200);
}

// ── TABS ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.nav-tab').forEach(function(b) { b.classList.remove('on'); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('on'); });
    btn.classList.add('on');
    document.getElementById('p-' + btn.dataset.t).classList.add('on');
    if (btn.dataset.t === 'adm') renderAdmin('');
  });
});

// ── DB HELPERS ────────────────────────────────────────────────────────────
function dbWrite(path, value, cb) {
  if (firebaseReady) {
    dbRef.ref(path).set(value).then(function() { cb && cb(); }).catch(function(e) { console.error(e); cb && cb(); });
  } else {
    lsSet('local_' + path.replace(/\//g,'_'), value);
    cb && cb();
  }
}
function dbUpdate(path, value, cb) {
  if (firebaseReady) {
    dbRef.ref(path).update(value).then(function() { cb && cb(); }).catch(function(e) { console.error(e); cb && cb(); });
  } else {
    var cur = lsGet('local_' + path.replace(/\//g,'_'), {});
    Object.assign(cur, value);
    lsSet('local_' + path.replace(/\//g,'_'), cur);
    cb && cb();
  }
}
function dbRemove(path, cb) {
  if (firebaseReady) {
    dbRef.ref(path).remove().then(function() { cb && cb(); }).catch(function() { cb && cb(); });
  } else {
    var key = 'local_' + path.replace(/\//g,'_');
    localStorage.removeItem(key);
    cb && cb();
  }
}

// ── SUBSCRIBE TO REALTIME CHANGES ─────────────────────────────────────────
function subscribeToData() {
  if (firebaseReady) {
    // Games
    dbRef.ref('games').on('value', function(snap) {
      var val = snap.val();
      if (val) {
        games = Object.values(val);
      } else {
        // First run: seed defaults
        var obj = {};
        DEFAULTS.forEach(function(g) { obj[g.id] = g; });
        dbRef.ref('games').set(obj);
        games = DEFAULTS.slice();
      }
      renderCol();
      if (document.getElementById('p-adm').classList.contains('on')) {
        renderAdmin(document.getElementById('asearch').value);
      }
    });
    // Owned
    dbRef.ref('owned').on('value', function(snap) {
      owned = snap.val() || {};
      renderCol();
      if (document.getElementById('p-adm').classList.contains('on')) {
        renderAdmin(document.getElementById('asearch').value);
      }
    });
  } else {
    // Local mode
    games = lsGet('local_games', null);
    if (!games) { games = DEFAULTS.slice(); lsSet('local_games', games); }
    owned = lsGet('local_owned', {});
    renderCol();
  }
}

// ── SAVE HELPERS ──────────────────────────────────────────────────────────
function saveGame(game, cb) {
  if (firebaseReady) {
    dbRef.ref('games/' + game.id).set(game).then(function() { cb && cb(); }).catch(function() { cb && cb(); });
  } else {
    var idx = games.findIndex(function(g) { return g.id === game.id; });
    if (idx !== -1) games[idx] = game; else games.push(game);
    lsSet('local_games', games);
    cb && cb();
  }
}
function deleteGame(id, cb) {
  if (firebaseReady) {
    dbRef.ref('games/' + id).remove().then(function() {
      dbRef.ref('owned/' + id).remove().then(function() { cb && cb(); });
    }).catch(function() { cb && cb(); });
  } else {
    games = games.filter(function(g) { return g.id !== id; });
    delete owned[id];
    lsSet('local_games', games);
    lsSet('local_owned', owned);
    cb && cb();
  }
}
function setOwned(id, val, cb) {
  if (firebaseReady) {
    if (val) {
      dbRef.ref('owned/' + id).set(true).then(function() { cb && cb(); });
    } else {
      dbRef.ref('owned/' + id).remove().then(function() { cb && cb(); });
    }
  } else {
    if (val) owned[id] = true; else delete owned[id];
    lsSet('local_owned', owned);
    cb && cb();
  }
}
function clearOwned(cb) {
  if (firebaseReady) {
    dbRef.ref('owned').remove().then(function() { cb && cb(); });
  } else {
    owned = {}; lsSet('local_owned', owned); cb && cb();
  }
}
function resetAll(cb) {
  if (firebaseReady) {
    var obj = {};
    DEFAULTS.forEach(function(g) { obj[g.id] = g; });
    dbRef.ref('games').set(obj).then(function() {
      dbRef.ref('owned').remove().then(function() { cb && cb(); });
    });
  } else {
    games = DEFAULTS.slice(); owned = {};
    lsSet('local_games', games); lsSet('local_owned', owned); cb && cb();
  }
}

// ── RENDER COLLECTION ─────────────────────────────────────────────────────
function renderCol() {
  var root = document.getElementById('groot');
  root.innerHTML = '';

  var grouped = {};
  games.forEach(function(g) {
    var s = g.sec || 'other';
    if (!grouped[s]) grouped[s] = [];
    grouped[s].push(g);
  });

  var first = true;
  SEC_ORDER.forEach(function(sec) {
    if (!grouped[sec] || !grouped[sec].length) return;
    var secGames = grouped[sec];
    var secOwnedCount = secGames.filter(function(g) { return owned[g.id]; }).length;

    var head = document.createElement('div'); head.className = 'sec-head';
    if (!first) head.style.marginTop = '36px';
    first = false;
    var nm = document.createElement('div'); nm.className = 'sec-name'; nm.textContent = SEC_LABEL[sec] || sec;
    var line = document.createElement('div'); line.className = 'sec-line';
    var cnt = document.createElement('div'); cnt.className = 'sec-count'; cnt.textContent = secOwnedCount + ' / ' + secGames.length;
    head.appendChild(nm); head.appendChild(line); head.appendChild(cnt);
    root.appendChild(head);

    var grid = document.createElement('div'); grid.className = 'game-grid';
    secGames.forEach(function(g) { grid.appendChild(makeCard(g)); });
    root.appendChild(grid);
  });

  updateStats();
}

function makeCard(game) {
  var isOwned = !!owned[game.id];
  var card = document.createElement('div');
  card.className = 'gcard' + (isOwned ? ' owned' : '');
  card.id = 'gc-' + game.id;

  // Cover
  var cov = document.createElement('div'); cov.className = 'gcover';
  var badge = document.createElement('div'); badge.className = 'owned-badge'; badge.textContent = '✓';
  if (game.coverUrl && game.coverUrl.trim()) {
    var img = document.createElement('img');
    img.src = game.coverUrl;
    img.alt = game.name;
    img.onerror = function() {
      if (img.parentNode === cov) {
        cov.removeChild(img);
        cov.insertBefore(makePh(game), badge);
      }
    };
    cov.appendChild(img);
  } else {
    cov.appendChild(makePh(game));
  }
  cov.appendChild(badge);

  // Info
  var inf = document.createElement('div'); inf.className = 'ginfo';
  var nm = document.createElement('div'); nm.className = 'gname'; nm.textContent = game.name;
  var meta = document.createElement('div'); meta.className = 'gmeta';
  var yr = document.createElement('span'); yr.className = 'gyear'; yr.textContent = game.year;
  var pl = document.createElement('span'); pl.className = 'gplat'; pl.textContent = game.plat;
  meta.appendChild(yr); meta.appendChild(pl);
  inf.appendChild(nm); inf.appendChild(meta);

  card.appendChild(cov); card.appendChild(inf);
  card.addEventListener('click', function() { toggleOwned(game.id); });
  return card;
}

function makePh(game) {
  var d = document.createElement('div'); d.className = 'gph';
  var ico = document.createElement('div'); ico.className = 'gph-icon'; ico.textContent = '◈';
  var nm = document.createElement('div'); nm.className = 'gph-name'; nm.textContent = game.name;
  d.appendChild(ico); d.appendChild(nm);
  return d;
}

function toggleOwned(id) {
  var wasOwned = !!owned[id];
  // Optimistic UI
  if (wasOwned) delete owned[id]; else owned[id] = true;
  var card = document.getElementById('gc-' + id);
  if (card) card.classList.toggle('owned', !wasOwned);
  updateStats();
  // Sync
  setOwned(id, !wasOwned, function() {
    if (!firebaseReady) renderCol(); // local mode re-render
  });
}

function updateStats() {
  var total = games.length;
  var count = Object.keys(owned).length;
  document.getElementById('h-owned').textContent = count;
  document.getElementById('h-total').textContent = total;
  document.getElementById('h-bar').style.width = (total ? (count / total * 100).toFixed(1) : 0) + '%';
}

// ── ADMIN ─────────────────────────────────────────────────────────────────
function renderAdmin(filter) {
  var list = document.getElementById('alist');
  list.innerHTML = '';
  var q = filter.toLowerCase();
  var shown = games.filter(function(g) { return !q || g.name.toLowerCase().indexOf(q) !== -1; });
  if (!shown.length) {
    var e = document.createElement('div'); e.className = 'empty-state'; e.textContent = 'Ничего не найдено';
    list.appendChild(e); return;
  }
  shown.forEach(function(game) {
    var row = document.createElement('div'); row.className = 'adm-row';

    // Thumb
    var thumb = document.createElement('div'); thumb.className = 'adm-thumb';
    if (game.coverUrl && game.coverUrl.trim()) {
      var ti = document.createElement('img'); ti.src = game.coverUrl;
      ti.onerror = function() { ti.style.display = 'none'; thumb.textContent = '◈'; };
      thumb.appendChild(ti);
    } else {
      thumb.textContent = '◈';
    }

    // Info
    var inf = document.createElement('div'); inf.className = 'adm-inf';
    var anm = document.createElement('div'); anm.className = 'adm-name'; anm.textContent = game.name;
    var sub = document.createElement('div'); sub.className = 'adm-sub'; sub.textContent = game.year + ' · ' + game.plat;
    inf.appendChild(anm); inf.appendChild(sub);

    // Actions
    var acts = document.createElement('div'); acts.className = 'adm-acts';

    // URL button
    var urlBtn = document.createElement('button');
    urlBtn.className = 'btn-url' + (game.coverUrl ? ' has-cover' : '');
    urlBtn.textContent = game.coverUrl ? '🖼 URL' : '+ URL';
    urlBtn.addEventListener('click', function() { openModal(game); });

    // Toggle owned
    var tl = document.createElement('label'); tl.className = 'tog';
    var ti2 = document.createElement('input'); ti2.type = 'checkbox'; ti2.id = 'at-' + game.id;
    ti2.checked = !!owned[game.id];
    ti2.addEventListener('change', function() { toggleOwned(game.id); });
    var tb = document.createElement('div'); tb.className = 'tog-track';
    var tlb = document.createElement('span'); tlb.className = 'tog-lbl'; tlb.textContent = 'есть';
    tl.appendChild(ti2); tl.appendChild(tb); tl.appendChild(tlb);

    // Delete
    var del = document.createElement('button'); del.className = 'btn-del'; del.textContent = '✕';
    del.addEventListener('click', function() {
      if (!confirm('Удалить «' + game.name + '»?')) return;
      deleteGame(game.id, function() {
        if (!firebaseReady) { renderCol(); renderAdmin(document.getElementById('asearch').value); }
        showToast('Удалено: ' + game.name);
      });
    });

    acts.appendChild(urlBtn); acts.appendChild(tl); acts.appendChild(del);
    row.appendChild(thumb); row.appendChild(inf); row.appendChild(acts);
    list.appendChild(row);
  });
}

document.getElementById('asearch').addEventListener('input', function() { renderAdmin(this.value); });

// ── URL COVER MODAL ───────────────────────────────────────────────────────
var modalGameId = null;

function openModal(game) {
  modalGameId = game.id;
  document.getElementById('modal-gname').textContent = game.name;
  document.getElementById('modal-url').value = game.coverUrl || '';
  updatePreview(game.coverUrl || '');
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  modalGameId = null;
}
function updatePreview(url) {
  var img = document.getElementById('modal-preview-img');
  var noPrev = document.getElementById('modal-no-prev');
  if (url && url.trim()) {
    img.src = url.trim();
    img.style.display = 'block';
    noPrev.style.display = 'none';
  } else {
    img.src = '';
    img.style.display = 'none';
    noPrev.style.display = 'block';
  }
}

document.getElementById('modal-url').addEventListener('input', function() { updatePreview(this.value); });
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

document.getElementById('modal-clear').addEventListener('click', function() {
  if (!modalGameId) return;
  var game = games.find(function(g) { return g.id === modalGameId; });
  if (!game) return;
  game.coverUrl = '';
  saveGame(game, function() {
    if (!firebaseReady) { renderCol(); renderAdmin(document.getElementById('asearch').value); }
    showToast('Обложка удалена');
    closeModal();
  });
});

document.getElementById('modal-save').addEventListener('click', function() {
  if (!modalGameId) return;
  var url = document.getElementById('modal-url').value.trim();
  var game = games.find(function(g) { return g.id === modalGameId; });
  if (!game) return;
  game.coverUrl = url;
  saveGame(game, function() {
    if (!firebaseReady) { renderCol(); renderAdmin(document.getElementById('asearch').value); }
    showToast('Обложка сохранена');
    closeModal();
  });
});

// ── ADD GAME ──────────────────────────────────────────────────────────────
document.getElementById('badd').addEventListener('click', function() {
  var name = document.getElementById('fn').value.trim();
  if (!name) { showToast('Введи название игры'); return; }
  var g = {
    id: 'u' + Date.now(),
    name: name,
    year: document.getElementById('fy').value.trim() || '—',
    plat: document.getElementById('fp').value.trim() || '—',
    sec:  document.getElementById('fs').value,
    coverUrl: document.getElementById('furl').value.trim()
  };
  saveGame(g, function() {
    if (!firebaseReady) { games.push(g); renderCol(); renderAdmin(document.getElementById('asearch').value); }
    showToast('Добавлено: ' + g.name);
  });
  document.getElementById('fn').value = '';
  document.getElementById('fy').value = '';
  document.getElementById('fp').value = '';
  document.getElementById('furl').value = '';
});

// ── RESETS ────────────────────────────────────────────────────────────────
document.getElementById('bro').addEventListener('click', function() {
  if (!confirm('Сбросить все галочки?')) return;
  clearOwned(function() {
    if (!firebaseReady) { owned = {}; renderCol(); renderAdmin(document.getElementById('asearch').value); }
    showToast('Галочки сброшены');
  });
});
document.getElementById('bra').addEventListener('click', function() {
  if (!confirm('Сбросить ВСЁ? Все игры вернутся к стандартным, галочки удалятся.')) return;
  resetAll(function() {
    if (!firebaseReady) { renderCol(); renderAdmin(''); }
    showToast('Всё сброшено');
  });
});

// ── INIT ──────────────────────────────────────────────────────────────────
subscribeToData();
</script>
