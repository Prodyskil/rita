<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rita's Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0C0C10; --surface:#13131A; --panel:#18181F;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#D8D4CC; --dim:#6B6B7A; --accent:#5B8DEF; --green:#4CAF7D;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* HEADER */
.site-header{padding:40px 40px 0;max-width:1200px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;}
@media(max-width:640px){.site-header{padding:26px 20px 0;flex-direction:column;align-items:flex-start;}}
.site-title{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,4vw,2.6rem);font-weight:800;color:#fff;letter-spacing:-0.02em;line-height:1;}
.site-title span{color:var(--accent);}
.site-sub{font-family:'Syne',sans-serif;font-size:.66rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-top:6px;}
.hstat{text-align:right;flex-shrink:0;}
@media(max-width:640px){.hstat{text-align:left;}}
.hstat .big{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:#fff;line-height:1;}
.hstat .lbl{font-size:.66rem;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-top:3px;}
.pline{width:130px;height:2px;background:var(--border2);border-radius:2px;margin-top:8px;margin-left:auto;overflow:hidden;}
@media(max-width:640px){.pline{margin-left:0;}}
.pfill{height:100%;background:var(--green);border-radius:2px;transition:width .6s ease;}

/* DIVIDER */
.divider{max-width:1200px;margin:26px auto 0;padding:0 40px;border-bottom:1px solid var(--border);}
@media(max-width:640px){.divider{padding:0 20px;}}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:32px 40px 60px;}
@media(max-width:640px){.main{padding:22px 20px 50px;}}

/* SECTIONS */
.seh{display:flex;align-items:baseline;gap:12px;margin:38px 0 14px;}
.seh:first-child{margin-top:0;}
.sename{font-family:'Syne',sans-serif;font-size:.63rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);white-space:nowrap;}
.seline{flex:1;height:1px;background:var(--border);}
.secnt{font-family:'Syne',sans-serif;font-size:.59rem;font-weight:600;color:var(--dim);opacity:.55;white-space:nowrap;}

/* CARDS */
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:10px;}

.gcard{
  border-radius:8px;background:var(--surface);
  border:1px solid var(--border);overflow:hidden;
  cursor:pointer;display:flex;flex-direction:column;
  transition:border-color .25s, transform .2s, box-shadow .25s, opacity .25s;
  position:relative;
}

/* Not owned — greyscale */
.gcard:not(.owned){opacity:.55;}
.gcard:not(.owned) .gcov{filter:grayscale(1) brightness(.6);transition:filter .3s;}
.gcard:not(.owned) .gname{color:var(--dim);}
.gcard:not(.owned):hover{opacity:1;border-color:var(--border2);transform:translateY(-2px);}
.gcard:not(.owned):hover .gcov{filter:grayscale(.25) brightness(.85);}

/* Owned — color + green border */
.gcard.owned{
  border-color:rgba(76,175,125,.45);
  box-shadow:0 0 0 1px rgba(76,175,125,.12), 0 6px 18px rgba(0,0,0,.28);
  opacity:1;
}
.gcard.owned:hover{
  border-color:var(--green);
  transform:translateY(-2px);
  box-shadow:0 0 0 1px rgba(76,175,125,.28), 0 10px 26px rgba(0,0,0,.36);
}
.gcard.owned .gcov{filter:none;}
.gcard.owned .gname{color:#fff;}

/* Cover area */
.gcov{
  width:100%;aspect-ratio:3/4;
  overflow:hidden;background:var(--panel);
  position:relative;flex-shrink:0;
}
.gcov img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s;}
.gcard:hover .gcov img{transform:scale(1.05);}

/* Placeholder when no cover */
.gph{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  background:var(--panel);
}
.gphi{font-size:1.4rem;opacity:.18;}
.gphn{
  font-family:'Syne',sans-serif;font-size:.44rem;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
  color:var(--dim);text-align:center;padding:0 8px;line-height:1.5;opacity:.55;
}

/* Owned checkmark */
.obadge{
  position:absolute;top:7px;right:7px;
  width:20px;height:20px;border-radius:50%;
  background:var(--green);
  display:none;align-items:center;justify-content:center;
  font-size:.65rem;font-weight:700;color:#fff;
  box-shadow:0 2px 8px rgba(76,175,125,.4);
}
.gcard.owned .obadge{display:flex;}

/* Card info */
.ginf{padding:9px 10px 10px;display:flex;flex-direction:column;gap:4px;border-top:1px solid var(--border);}
.gname{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;color:var(--dim);line-height:1.3;transition:color .25s;}
.gmeta{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.gyear{font-size:.6rem;color:var(--dim);font-weight:300;opacity:.65;}
.gplat{font-size:.51rem;color:var(--dim);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-family:'Syne',sans-serif;font-weight:600;}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="site-title">Rita's <span>Collection</span></div>
    <div class="site-sub">Sonic the Hedgehog Universe</div>
  </div>
  <div class="hstat">
    <div class="big"><span id="ho">0</span> / <span id="ht">0</span></div>
    <div class="lbl">игр имеется</div>
    <div class="pline"><div class="pfill" id="hbar" style="width:0%"></div></div>
  </div>
</header>
<div class="divider"></div>

<main class="main" id="root"></main>

<script>
// ============================================================
//  ИГРЫ — вставляй URL обложки в поле coverUrl: "..."
//  Если обложки нет — оставь пустую строку coverUrl: ""
// ============================================================
var GAMES = [

  // ── Sega Genesis ─────────────────────────────────────────
  { id:'sg1',  sec:'genesis',   name:'Sonic the Hedgehog',         year:'1991', plat:'Genesis',
    coverUrl: "" },

  { id:'sg2',  sec:'genesis',   name:'Sonic the Hedgehog 2',       year:'1992', plat:'Genesis',
    coverUrl: "" },

  { id:'sg3',  sec:'genesis',   name:'Sonic CD',                   year:'1993', plat:'Sega CD',
    coverUrl: "" },

  { id:'sg4',  sec:'genesis',   name:'Sonic the Hedgehog 3',       year:'1994', plat:'Genesis',
    coverUrl: "" },

  { id:'sg5',  sec:'genesis',   name:'Sonic & Knuckles',           year:'1994', plat:'Genesis',
    coverUrl: "" },

  { id:'sg6',  sec:'genesis',   name:'Sonic 3D Blast',             year:'1996', plat:'Genesis',
    coverUrl: "" },

  // ── Dreamcast / GameCube ─────────────────────────────────
  { id:'dc1',  sec:'dreamcast', name:'Sonic Adventure',            year:'1998', plat:'Dreamcast',
    coverUrl: "" },

  { id:'dc2',  sec:'dreamcast', name:'Sonic Adventure 2',          year:'2001', plat:'Dreamcast',
    coverUrl: "" },

  { id:'dc3',  sec:'dreamcast', name:'Sonic Heroes',               year:'2003', plat:'PS2 / GCN',
    coverUrl: "" },

  { id:'dc4',  sec:'dreamcast', name:'Shadow the Hedgehog',        year:'2005', plat:'PS2 / GCN',
    coverUrl: "" },

  // ── 7th Gen Consoles ─────────────────────────────────────
  { id:'c71',  sec:'7thgen',    name:'Sonic the Hedgehog (2006)',  year:'2006', plat:'PS3 / 360',
    coverUrl: "" },

  { id:'c72',  sec:'7thgen',    name:'Sonic Unleashed',            year:'2008', plat:'PS3 / 360',
    coverUrl: "" },

  { id:'c73',  sec:'7thgen',    name:'Sonic Colors',               year:'2010', plat:'Wii',
    coverUrl: "" },

  { id:'c74',  sec:'7thgen',    name:'Sonic Generations',          year:'2011', plat:'PS3 / 360',
    coverUrl: "" },

  { id:'c75',  sec:'7thgen',    name:'Sonic Lost World',           year:'2013', plat:'Wii U',
    coverUrl: "" },

  // ── Modern ───────────────────────────────────────────────
  { id:'mod1', sec:'modern',    name:'Sonic Forces',               year:'2017', plat:'Multi',
    coverUrl: "" },

  { id:'mod2', sec:'modern',    name:'Sonic Frontiers',            year:'2022', plat:'Multi',
    coverUrl: "" },

  { id:'mod3', sec:'modern',    name:'Sonic Superstars',           year:'2023', plat:'Multi',
    coverUrl: "" },

  // ── Remasters ────────────────────────────────────────────
  { id:'rem1', sec:'remaster',  name:'Sonic Colors: Ultimate',     year:'2021', plat:'Multi',
    coverUrl: "" },

  { id:'rem2', sec:'remaster',  name:'Sonic Origins',              year:'2022', plat:'Multi',
    coverUrl: "" },

  { id:'rem3', sec:'remaster',  name:'Sonic Origins Plus',         year:'2023', plat:'Multi',
    coverUrl: "" },

  // ── Game Gear ────────────────────────────────────────────
  { id:'hh1',  sec:'gamegear',  name:'Sonic Chaos',                year:'1993', plat:'Game Gear',
    coverUrl: "" },

  { id:'hh2',  sec:'gamegear',  name:'Sonic Triple Trouble',       year:'1994', plat:'Game Gear',
    coverUrl: "" },

  { id:'hh3',  sec:'gamegear',  name:'Sonic Labyrinth',            year:'1995', plat:'Game Gear',
    coverUrl: "" },

  { id:'hh4',  sec:'gamegear',  name:'Sonic Blast',                year:'1996', plat:'Game Gear',
    coverUrl: "" },

  // ── Game Boy Advance ─────────────────────────────────────
  { id:'gba1', sec:'gba',       name:'Sonic Advance',              year:'2001', plat:'GBA',
    coverUrl: "" },

  { id:'gba2', sec:'gba',       name:'Sonic Advance 2',            year:'2002', plat:'GBA',
    coverUrl: "" },

  { id:'gba3', sec:'gba',       name:'Sonic Advance 3',            year:'2004', plat:'GBA',
    coverUrl: "" },

  { id:'gba4', sec:'gba',       name:'Sonic Battle',               year:'2003', plat:'GBA',
    coverUrl: "" },

  // ── DS / 3DS ─────────────────────────────────────────────
  { id:'ds1',  sec:'ds',        name:'Sonic Rush',                 year:'2005', plat:'DS',
    coverUrl: "" },

  { id:'ds2',  sec:'ds',        name:'Sonic Rush Adventure',       year:'2007', plat:'DS',
    coverUrl: "" },

  { id:'ds3',  sec:'ds',        name:'Sonic Lost World (3DS)',     year:'2013', plat:'3DS',
    coverUrl: "" },

  // ── Wii ──────────────────────────────────────────────────
  { id:'wii1', sec:'wii',       name:'Sonic and the Secret Rings', year:'2007', plat:'Wii',
    coverUrl: "" },

  { id:'wii2', sec:'wii',       name:'Sonic and the Black Knight', year:'2009', plat:'Wii',
    coverUrl: "" },

  // ── Racing & Spin-offs ───────────────────────────────────
  { id:'sp1',  sec:'racing',    name:'Sonic Riders',               year:'2006', plat:'Multi',
    coverUrl: "" },

  { id:'sp2',  sec:'racing',    name:'Sonic Riders: Zero Gravity', year:'2008', plat:'Multi',
    coverUrl: "" },

  { id:'sp3',  sec:'racing',    name:'Sonic Free Riders',          year:'2010', plat:'Xbox 360',
    coverUrl: "" },

  { id:'sp4',  sec:'racing',    name:'Sonic & Sega All-Stars Racing', year:'2010', plat:'Multi',
    coverUrl: "" },

  { id:'sp5',  sec:'racing',    name:'All-Stars Racing Transformed',  year:'2012', plat:'Multi',
    coverUrl: "" },

  { id:'sp6',  sec:'racing',    name:'Team Sonic Racing',          year:'2019', plat:'Multi',
    coverUrl: "" },

  // ── Sonic Mania ──────────────────────────────────────────
  { id:'ind1', sec:'mania',     name:'Sonic Mania',                year:'2017', plat:'Multi',
    coverUrl: "" },

  { id:'ind2', sec:'mania',     name:'Sonic Mania Plus',           year:'2018', plat:'Multi',
    coverUrl: "" },

];

// ============================================================
//  РАЗДЕЛЫ — порядок и названия
// ============================================================
var SECTIONS = [
  { key:'genesis',   label:'Sega Genesis' },
  { key:'dreamcast', label:'Dreamcast / GameCube' },
  { key:'7thgen',    label:'7th Gen Consoles' },
  { key:'modern',    label:'Modern' },
  { key:'remaster',  label:'Remasters' },
  { key:'gamegear',  label:'Game Gear' },
  { key:'gba',       label:'Game Boy Advance' },
  { key:'ds',        label:'DS / 3DS' },
  { key:'wii',       label:'Wii' },
  { key:'racing',    label:'Racing & Spin-offs' },
  { key:'mania',     label:'Sonic Mania' },
];

// ============================================================
//  СОСТОЯНИЕ — галочки хранятся в localStorage
// ============================================================
var owned = {};
try { owned = JSON.parse(localStorage.getItem('rita_owned') || '{}'); } catch(e) {}

function saveOwned() {
  try { localStorage.setItem('rita_owned', JSON.stringify(owned)); } catch(e) {}
}

// ============================================================
//  РЕНДЕР
// ============================================================
function render() {
  var root = document.getElementById('root');
  root.innerHTML = '';

  var grouped = {};
  GAMES.forEach(function(g) {
    if (!grouped[g.sec]) grouped[g.sec] = [];
    grouped[g.sec].push(g);
  });

  var first = true;
  SECTIONS.forEach(function(sec) {
    var list = grouped[sec.key];
    if (!list || !list.length) return;

    var ownedCount = list.filter(function(g) { return owned[g.id]; }).length;

    // Section heading
    var h = document.createElement('div');
    h.className = 'seh';
    if (!first) h.style.marginTop = '38px';
    first = false;

    var nm = document.createElement('div'); nm.className = 'sename'; nm.textContent = sec.label;
    var ln = document.createElement('div'); ln.className = 'seline';
    var ct = document.createElement('div'); ct.className = 'secnt'; ct.textContent = ownedCount + ' / ' + list.length;
    h.appendChild(nm); h.appendChild(ln); h.appendChild(ct);
    root.appendChild(h);

    // Cards grid
    var grid = document.createElement('div'); grid.className = 'ggrid';
    list.forEach(function(g) { grid.appendChild(makeCard(g)); });
    root.appendChild(grid);
  });

  updateStats();
}

function makeCard(g) {
  var isOwned = !!owned[g.id];

  var card = document.createElement('div');
  card.className = 'gcard' + (isOwned ? ' owned' : '');
  card.id = 'gc-' + g.id;

  // Cover
  var cov = document.createElement('div'); cov.className = 'gcov';
  var badge = document.createElement('div'); badge.className = 'obadge'; badge.textContent = '✓';

  if (g.coverUrl && g.coverUrl.trim()) {
    var img = document.createElement('img');
    img.src = g.coverUrl;
    img.alt = g.name;
    img.onerror = function() {
      if (img.parentNode === cov) {
        cov.removeChild(img);
        cov.insertBefore(makePh(g), badge);
      }
    };
    cov.appendChild(img);
  } else {
    cov.appendChild(makePh(g));
  }
  cov.appendChild(badge);

  // Info
  var inf = document.createElement('div'); inf.className = 'ginf';
  var nm  = document.createElement('div'); nm.className  = 'gname'; nm.textContent = g.name;
  var mt  = document.createElement('div'); mt.className  = 'gmeta';
  var yr  = document.createElement('span'); yr.className = 'gyear'; yr.textContent = g.year;
  var pl  = document.createElement('span'); pl.className = 'gplat'; pl.textContent = g.plat;
  mt.appendChild(yr); mt.appendChild(pl);
  inf.appendChild(nm); inf.appendChild(mt);

  card.appendChild(cov);
  card.appendChild(inf);

  card.addEventListener('click', function() { toggle(g.id); });
  return card;
}

function makePh(g) {
  var d = document.createElement('div'); d.className = 'gph';
  var i = document.createElement('div'); i.className = 'gphi'; i.textContent = '◈';
  var n = document.createElement('div'); n.className = 'gphn'; n.textContent = g.name;
  d.appendChild(i); d.appendChild(n);
  return d;
}

// ============================================================
//  TOGGLE
// ============================================================
function toggle(id) {
  if (owned[id]) delete owned[id]; else owned[id] = true;
  saveOwned();

  var isOwned = !!owned[id];
  var card = document.getElementById('gc-' + id);
  if (card) card.classList.toggle('owned', isOwned);

  updateStats();
  updateSectionCounts();
}

function updateStats() {
  var total = GAMES.length;
  var count = Object.keys(owned).length;
  document.getElementById('ho').textContent = count;
  document.getElementById('ht').textContent = total;
  document.getElementById('hbar').style.width = (total ? (count / total * 100).toFixed(1) : 0) + '%';
}

function updateSectionCounts() {
  var grouped = {};
  GAMES.forEach(function(g) {
    if (!grouped[g.sec]) grouped[g.sec] = [];
    grouped[g.sec].push(g);
  });
  document.querySelectorAll('.seh').forEach(function(h, i) {
    var sec = SECTIONS[i];
    if (!sec) return;
    var list = grouped[sec.key] || [];
    var oc = list.filter(function(g) { return owned[g.id]; }).length;
    var ct = h.querySelector('.secnt');
    if (ct) ct.textContent = oc + ' / ' + list.length;
  });
}

// ============================================================
//  INIT
// ============================================================
render();
</script>
</body>
</html>
