<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rita's Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0C0C10;
  --surface: #13131A;
  --panel:   #18181F;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text:    #D8D4CC;
  --dim:     #6B6B7A;
  --accent:  #5B8DEF;
  --accent2: #E2A96B;
  --owned:   #5B8DEF;
  --danger:  #C0544A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

.site-header {
  padding: 40px 40px 0;
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
}

.site-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.02em;
  line-height: 1;
}

.site-title span { color: var(--accent); }

.site-sub {
  font-family: 'Syne', sans-serif;
  font-size: .7rem;
  font-weight: 600;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--dim);
  margin-top: 6px;
}

.header-stat { text-align: right; flex-shrink: 0; }
.header-stat .big {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  color: #fff;
  line-height: 1;
}
.header-stat .lbl {
  font-size: .68rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--dim);
  margin-top: 3px;
}
.progress-line {
  width: 140px;
  height: 2px;
  background: var(--border2);
  border-radius: 2px;
  margin-top: 8px;
  margin-left: auto;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .6s ease;
}

.site-nav {
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 40px 0;
  display: flex;
  align-items: center;
  gap: 0;
  border-bottom: 1px solid var(--border);
}

.nav-tab {
  font-family: 'Syne', sans-serif;
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 12px 20px 12px 0;
  margin-bottom: -1px;
  cursor: pointer;
  transition: color .2s, border-color .2s;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.on { color: #fff; border-bottom-color: var(--accent); }

.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 40px 60px;
}

@media (max-width: 640px) {
  .site-header { padding: 28px 20px 0; flex-direction: column; align-items: flex-start; }
  .header-stat { text-align: left; }
  .progress-line { margin-left: 0; }
  .site-nav { padding: 20px 20px 0; }
  .main { padding: 24px 20px 60px; }
}

.panel { display: none; }
.panel.on { display: block; animation: appear .2s ease; }
@keyframes appear { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.sec-head {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin: 36px 0 16px;
}
.sec-head:first-child { margin-top: 0; }
.sec-name {
  font-family: 'Syne', sans-serif;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--dim);
}
.sec-line { flex: 1; height: 1px; background: var(--border); }
.sec-count {
  font-family: 'Syne', sans-serif;
  font-size: .62rem;
  font-weight: 600;
  letter-spacing: .1em;
  color: var(--dim);
  opacity: .6;
}

.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}

.gcard {
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  position: relative;
}
.gcard:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(0,0,0,.4);
}
.gcard.owned { border-color: rgba(91,141,239,.3); }
.gcard.owned:hover { border-color: rgba(91,141,239,.6); }

.gcover {
  width: 100%;
  aspect-ratio: 3/4;
  overflow: hidden;
  background: var(--panel);
  position: relative;
  flex-shrink: 0;
}
.gcover img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: transform .35s ease;
}
.gcard:hover .gcover img { transform: scale(1.05); }

.gph {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  background: var(--panel);
}
.gph-icon { font-size: 1.6rem; opacity: .3; }
.gph-name {
  font-family: 'Syne', sans-serif;
  font-size: .48rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--dim);
  text-align: center;
  padding: 0 8px;
  line-height: 1.5;
  opacity: .7;
}

.owned-dot {
  position: absolute;
  top: 8px; right: 8px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  display: none;
}
.gcard.owned .owned-dot { display: block; }

.gcard.owned .gcover::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(91,141,239,.06);
  pointer-events: none;
}

.ginfo {
  padding: 10px 10px 11px;
  display: flex; flex-direction: column; gap: 4px;
  border-top: 1px solid var(--border);
}
.gname {
  font-family: 'Syne', sans-serif;
  font-size: .72rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.gcard.owned .gname { color: #fff; }
.gmeta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
}
.gyear { font-size: .62rem; color: var(--dim); font-weight: 300; }
.gplat {
  font-size: .55rem;
  color: var(--dim);
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  letter-spacing: .04em;
}

.adm-grid { display: flex; flex-direction: column; gap: 24px; }

.adm-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px 24px;
}

.adm-block-title {
  font-family: 'Syne', sans-serif;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.adm-search {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: .88rem;
  padding: 9px 14px;
  outline: none;
  margin-bottom: 14px;
  transition: border-color .2s;
}
.adm-search:focus { border-color: var(--accent); }
.adm-search::placeholder { color: var(--dim); opacity: .6; }

.adm-list {
  display: flex; flex-direction: column; gap: 6px;
  max-height: 420px; overflow-y: auto; padding-right: 4px;
}
.adm-list::-webkit-scrollbar { width: 3px; }
.adm-list::-webkit-scrollbar-track { background: transparent; }
.adm-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.adm-row {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--panel);
  transition: border-color .15s;
}
.adm-row:hover { border-color: var(--border2); }

.adm-thumb {
  width: 32px; height: 43px;
  border-radius: 4px;
  background: var(--bg);
  flex-shrink: 0;
  overflow: hidden;
  border: 1px solid var(--border2);
  position: relative;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; color: var(--dim);
}
.adm-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

.adm-inf { flex: 1; min-width: 0; }
.adm-name {
  font-family: 'Syne', sans-serif;
  font-size: .78rem; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
.adm-sub { font-size: .63rem; color: var(--dim); margin-top: 2px; font-weight: 300; }

.adm-acts { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.tog { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
.tog input { display: none; }
.tog-track {
  width: 30px; height: 16px;
  border-radius: 999px;
  background: var(--bg);
  border: 1px solid var(--border2);
  position: relative; flex-shrink: 0;
  transition: background .2s, border-color .2s;
}
.tog-track::after {
  content: ''; position: absolute;
  top: 2px; left: 2px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--dim);
  transition: all .2s;
}
.tog input:checked ~ .tog-track { background: rgba(91,141,239,.15); border-color: var(--accent); }
.tog input:checked ~ .tog-track::after { transform: translateX(14px); background: var(--accent); }
.tog-lbl { font-size: .65rem; color: var(--dim); font-weight: 500; font-family: 'Syne', sans-serif; letter-spacing: .05em; }

.btn-del {
  background: none;
  border: 1px solid rgba(192,84,74,.25);
  color: rgba(192,84,74,.7);
  border-radius: 4px;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; cursor: pointer;
  transition: all .15s;
}
.btn-del:hover { border-color: var(--danger); color: var(--danger); background: rgba(192,84,74,.08); }

.add-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 520px) { .add-grid { grid-template-columns: 1fr; } }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-family: 'Syne', sans-serif;
  font-size: .6rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: var(--dim);
}
.field input, .field select {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: .88rem;
  padding: 9px 12px;
  outline: none;
  transition: border-color .2s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--dim); opacity: .5; }
.field select option { background: #1a1a22; }

.btn-add {
  margin-top: 14px;
  font-family: 'Syne', sans-serif;
  font-size: .68rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 10px 22px;
  background: var(--accent);
  color: #fff;
  border: none; border-radius: 6px;
  cursor: pointer;
  transition: opacity .2s, transform .15s;
}
.btn-add:hover { opacity: .85; transform: translateY(-1px); }
.btn-add:active { transform: none; }

.danger-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-dng {
  font-family: 'Syne', sans-serif;
  font-size: .63rem; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 8px 16px;
  background: transparent;
  color: rgba(192,84,74,.7);
  border: 1px solid rgba(192,84,74,.25);
  border-radius: 6px; cursor: pointer;
  transition: all .2s;
}
.btn-dng:hover { color: var(--danger); border-color: var(--danger); background: rgba(192,84,74,.06); }

.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 11px 18px;
  font-size: .82rem; color: var(--text); font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  pointer-events: none;
  opacity: 0; transform: translateY(6px); transition: all .25s;
}
.toast.show { opacity: 1; transform: none; }
.toast.good { border-color: rgba(91,141,239,.4); }

.empty-state {
  text-align: center;
  padding: 20px;
  color: var(--dim);
  font-size: .82rem;
}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="site-title">Rita's <span>Collection</span></div>
    <div class="site-sub">Sonic the Hedgehog Universe</div>
  </div>
  <div class="header-stat">
    <div class="big"><span id="h-owned">0</span> / <span id="h-total">0</span></div>
    <div class="lbl">игр имеется</div>
    <div class="progress-line"><div class="progress-fill" id="h-bar" style="width:0%"></div></div>
  </div>
</header>

<nav class="site-nav">
  <button class="nav-tab on" data-t="col">Коллекция</button>
  <button class="nav-tab" data-t="adm">Управление</button>
</nav>

<main class="main">
  <div class="panel on" id="p-col">
    <div id="groot"></div>
  </div>

  <div class="panel" id="p-adm">
    <div class="adm-grid">
      <div class="adm-block">
        <div class="adm-block-title">Список игр</div>
        <input class="adm-search" id="asearch" type="text" placeholder="Поиск...">
        <div class="adm-list" id="alist"></div>
      </div>

      <div class="adm-block">
        <div class="adm-block-title">Добавить игру</div>
        <div class="add-grid">
          <div class="field"><label>Название</label><input id="fn" type="text" placeholder="Sonic the Hedgehog"></div>
          <div class="field"><label>Год</label><input id="fy" type="text" placeholder="1991"></div>
          <div class="field"><label>Платформа</label><input id="fp" type="text" placeholder="Genesis, PS4..."></div>
          <div class="field"><label>URL обложки</label><input id="fc" type="text" placeholder="https://..."></div>
          <div class="field">
            <label>Раздел</label>
            <select id="fs">
              <option value="genesis">Genesis</option>
              <option value="dreamcast">Dreamcast</option>
              <option value="7thgen">7-е поколение</option>
              <option value="modern">Современные</option>
              <option value="remaster">Ремастеры</option>
              <option value="gamegear">Game Gear</option>
              <option value="gba">GBA</option>
              <option value="ds">DS / 3DS</option>
              <option value="wii">Wii</option>
              <option value="racing">Гонки</option>
              <option value="mania">Mania</option>
              <option value="mobile">Мобильные</option>
              <option value="other">Другое</option>
            </select>
          </div>
        </div>
        <button class="btn-add" id="badd">Добавить</button>
      </div>

      <div class="adm-block">
        <div class="adm-block-title">Сброс данных</div>
        <div class="danger-row">
          <button class="btn-dng" id="bro">Сбросить галочки</button>
          <button class="btn-dng" id="bra">Сбросить всё</button>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

  {id:'gba3', name:'Sonic Advance 3',               year:'2004', plat:'GBA',       sec:'gba',       cover:'https://upload.wikimedia.org/wikipedia/ru/c/cd/Sonic_Advance_3_Coverart.png'},

  {id:'ds3',  name:'Sonic Lost World (3DS)',        year:'2013', plat:'3DS',       sec:'ds',        cover:'https://static.wikia.nocookie.net/sonic/images/8/8a/SonicLostWorld3DSBox.jpg/revision/latest?cb=20150322201407'},
  {id:'wii1', name:'Sonic and the Secret Rings',    year:'2007', plat:'Wii',       sec:'wii',       cover:'https://upload.wikimedia.org/wikipedia/ru/8/89/Sonic_and_the_Secret_Rings_Box.jpg'},
  {id:'wii2', name:'Sonic and the Black Knight',    year:'2009', plat:'Wii',       sec:'wii',       cover:'https://upload.wikimedia.org/wikipedia/ru/e/e3/Sonic_and_the_Black_Knight_Cover.jpg'},

  {id:'sp4',  name:'Sonic & Sega All-Stars Racing', year:'2010', plat:'Multi',     sec:'racing',    cover:'https://upload.wikimedia.org/wikipedia/ru/b/b6/%D0%9E%D0%B1%D0%BB%D0%BE%D0%B6%D0%BA%D0%B0_%D0%B8%D0%B3%D1%80%D1%8B_Sonic_%26_SEGA_All-Stars_Racing.jpg'},

  {id:'ind2', name:'Sonic Mania Plus',              year:'2018', plat:'Multi',     sec:'mania',     cover:'https://upload.wikimedia.org/wikipedia/ru/7/72/%D0%9E%D0%B1%D0%BB%D0%BE%D0%B6%D0%BA%D0%B0_%D0%B8%D0%B3%D1%80%D1%8B_Sonic_Mania_Plus.jpg'},
  {id:'mob1', name:'Sonic Dash',                    year:'2013', plat:'Mobile',    sec:'mobile',    cover:''},
  {id:'mob2', name:'Sonic Forces: Speed Battle',    year:'2017', plat:'Mobile',    sec:'mobile',    cover:''},
  {id:'mob3', name:'Sonic Jump',                    year:'2012', plat:'Mobile',    sec:'mobile',    cover:''}
];

var SEC_LABEL = {
  genesis:'Sega Genesis', dreamcast:'Dreamcast / GameCube', '7thgen':'7th Gen Consoles',
  modern:'Modern', remaster:'Remasters', gamegear:'Game Gear', gba:'Game Boy Advance',
  ds:'DS / 3DS', wii:'Wii', racing:'Racing & Spin-offs', mania:'Sonic Mania', mobile:'Mobile', other:'Other'
};
var SEC_ORDER = ['genesis','dreamcast','7thgen','modern','remaster','gamegear','gba','ds','wii','racing','mania','mobile','other'];

function lsGet(k, d) { try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return d; } }
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { showToast('Ошибка сохранения'); } }

var games = lsGet('rcol_g', null);
if (!games) { games = JSON.parse(JSON.stringify(DEFAULTS)); lsSet('rcol_g', games); }
var owned = lsGet('rcol_o', []);

var _tt = null;
function showToast(msg, good) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (good ? ' good' : '');
  clearTimeout(_tt);
  _tt = setTimeout(function() { el.classList.remove('show'); }, 2200);
}

document.querySelectorAll('.nav-tab').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.nav-tab').forEach(function(b) { b.classList.remove('on'); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('on'); });
    btn.classList.add('on');
    document.getElementById('p-' + btn.dataset.t).classList.add('on');
    if (btn.dataset.t === 'adm') renderAdmin('');
  });
});

function makePh(game) {
  var d = document.createElement('div'); d.className = 'gph';
  var ico = document.createElement('div'); ico.className = 'gph-icon'; ico.textContent = '◈';
  var nm = document.createElement('div'); nm.className = 'gph-name'; nm.textContent = game.name;
  d.appendChild(ico); d.appendChild(nm);
  return d;
}

function fillCover(wrap, game) {
  var dot = wrap.querySelector('.owned-dot');
  Array.from(wrap.childNodes).forEach(function(n) { if (n !== dot) wrap.removeChild(n); });
  if (game.cover) {
    var img = document.createElement('img');
    img.src = game.cover;
    img.alt = game.name;
    img.onerror = function() {
      if (img.parentNode === wrap) {
        wrap.removeChild(img);
        wrap.insertBefore(makePh(game), dot);
      }
    };
    wrap.insertBefore(img, dot);
  } else {
    wrap.insertBefore(makePh(game), dot);
  }
}

function makeCard(game) {
  var isOwned = owned.indexOf(game.id) !== -1;
  var card = document.createElement('div');
  card.className = 'gcard' + (isOwned ? ' owned' : '');
  card.id = 'gc-' + game.id;

  var cov = document.createElement('div'); cov.className = 'gcover';
  var dot = document.createElement('div'); dot.className = 'owned-dot';
  cov.appendChild(dot);
  fillCover(cov, game);

  var inf = document.createElement('div'); inf.className = 'ginfo';
  var nm = document.createElement('div'); nm.className = 'gname'; nm.textContent = game.name;
  var meta = document.createElement('div'); meta.className = 'gmeta';
  var yr = document.createElement('span'); yr.className = 'gyear'; yr.textContent = game.year;
  var pl = document.createElement('span'); pl.className = 'gplat'; pl.textContent = game.plat;
  meta.appendChild(yr); meta.appendChild(pl);
  inf.appendChild(nm); inf.appendChild(meta);

  card.appendChild(cov); card.appendChild(inf);
  card.addEventListener('click', function() { toggleOwned(game.id); });
  return card;
}

function renderCol() {
  var root = document.getElementById('groot');
  root.innerHTML = '';
  var grouped = {};
  games.forEach(function(g) {
    var s = g.sec || 'other';
    if (!grouped[s]) grouped[s] = [];
    grouped[s].push(g);
  });
  var first = true;
  SEC_ORDER.forEach(function(sec) {
    if (!grouped[sec] || !grouped[sec].length) return;
    var h = document.createElement('div'); h.className = 'sec-head';
    if (!first) h.style.marginTop = '36px';
    first = false;
    var nm = document.createElement('div'); nm.className = 'sec-name'; nm.textContent = SEC_LABEL[sec] || sec;
    var line = document.createElement('div'); line.className = 'sec-line';
    var cnt = document.createElement('div'); cnt.className = 'sec-count';
    var secOwned = grouped[sec].filter(function(g) { return owned.indexOf(g.id) !== -1; }).length;
    cnt.textContent = secOwned + ' / ' + grouped[sec].length;
    h.appendChild(nm); h.appendChild(line); h.appendChild(cnt);
    root.appendChild(h);
    var grid = document.createElement('div'); grid.className = 'game-grid';
    grouped[sec].forEach(function(g) { grid.appendChild(makeCard(g)); });
    root.appendChild(grid);
  });
  updateStats();
}

function toggleOwned(id) {
  var idx = owned.indexOf(id);
  if (idx === -1) owned.push(id); else owned.splice(idx, 1);
  lsSet('rcol_o', owned);
  var isOn = owned.indexOf(id) !== -1;
  var card = document.getElementById('gc-' + id);
  if (card) card.classList.toggle('owned', isOn);
  var tog = document.getElementById('at-' + id);
  if (tog) tog.checked = isOn;
  updateStats();
  renderSecCounts();
}

function renderSecCounts() {
  var grouped = {};
  games.forEach(function(g) { var s = g.sec||'other'; if(!grouped[s]) grouped[s]=[]; grouped[s].push(g); });
  document.querySelectorAll('.sec-count').forEach(function(el, i) {
    var sec = SEC_ORDER.filter(function(s) { return grouped[s] && grouped[s].length; })[i];
    if (!sec) return;
    var secOwned = grouped[sec].filter(function(g) { return owned.indexOf(g.id) !== -1; }).length;
    el.textContent = secOwned + ' / ' + grouped[sec].length;
  });
}

function updateStats() {
  var total = games.length, count = owned.length;
  document.getElementById('h-owned').textContent = count;
  document.getElementById('h-total').textContent = total;
  document.getElementById('h-bar').style.width = (total ? (count/total*100).toFixed(1) : 0) + '%';
}

function renderAdmin(filter) {
  var list = document.getElementById('alist');
  list.innerHTML = '';
  var q = filter.toLowerCase();
  var shown = games.filter(function(g) { return !q || g.name.toLowerCase().indexOf(q) !== -1; });
  if (!shown.length) {
    var e = document.createElement('div'); e.className = 'empty-state'; e.textContent = 'Ничего не найдено';
    list.appendChild(e); return;
  }
  shown.forEach(function(game) {
    var row = document.createElement('div'); row.className = 'adm-row';

    var thumb = document.createElement('div'); thumb.className = 'adm-thumb';
    if (game.cover) {
      var ti = document.createElement('img');
      ti.src = game.cover;
      ti.alt = game.name;
      thumb.appendChild(ti);
    } else {
      thumb.textContent = '◈';
    }

    var inf = document.createElement('div'); inf.className = 'adm-inf';
    var anm = document.createElement('div'); anm.className = 'adm-name'; anm.textContent = game.name;
    var sub = document.createElement('div'); sub.className = 'adm-sub';
    sub.textContent = game.year + ' · ' + game.plat + (game.cover ? ' · URL задан' : ' · URL пустой');
    inf.appendChild(anm); inf.appendChild(sub);

    var acts = document.createElement('div'); acts.className = 'adm-acts';

    var tl = document.createElement('label'); tl.className = 'tog';
    var ti2 = document.createElement('input'); ti2.type = 'checkbox'; ti2.id = 'at-' + game.id;
    ti2.checked = owned.indexOf(game.id) !== -1;
    ti2.addEventListener('change', function() { toggleOwned(game.id); });
    var tb = document.createElement('div'); tb.className = 'tog-track';
    var tlb = document.createElement('span'); tlb.className = 'tog-lbl'; tlb.textContent = 'есть';
    tl.appendChild(ti2); tl.appendChild(tb); tl.appendChild(tlb);

    var del = document.createElement('button'); del.className = 'btn-del'; del.textContent = '✕';
    del.addEventListener('click', function() {
      if (!confirm('Удалить «' + game.name + '»?')) return;
      games = games.filter(function(g) { return g.id !== game.id; });
      owned = owned.filter(function(i) { return i !== game.id; });
      lsSet('rcol_g', games); lsSet('rcol_o', owned);
      renderCol(); renderAdmin(document.getElementById('asearch').value);
      showToast('Удалено: ' + game.name);
    });

    acts.appendChild(tl); acts.appendChild(del);
    row.appendChild(thumb); row.appendChild(inf); row.appendChild(acts);
    list.appendChild(row);
  });
}

document.getElementById('asearch').addEventListener('input', function() { renderAdmin(this.value); });

document.getElementById('badd').addEventListener('click', function() {
  var name = document.getElementById('fn').value.trim();
  if (!name) { showToast('Введи название игры'); return; }
  var g = {
    id:'u'+Date.now(),
    name:name,
    year:document.getElementById('fy').value.trim()||'—',
    plat:document.getElementById('fp').value.trim()||'—',
    sec:document.getElementById('fs').value,
    cover:document.getElementById('fc').value.trim()||''
  };
  games.push(g); lsSet('rcol_g', games);
  document.getElementById('fn').value = '';
  document.getElementById('fy').value = '';
  document.getElementById('fp').value = '';
  document.getElementById('fc').value = '';
  renderCol(); renderAdmin(document.getElementById('asearch').value);
  showToast('Добавлено: ' + g.name, true);
});

document.getElementById('bro').addEventListener('click', function() {
  if (!confirm('Сбросить все галочки?')) return;
  owned = []; lsSet('rcol_o', owned);
  renderCol(); renderAdmin(document.getElementById('asearch').value);
  showToast('Галочки сброшены');
});

document.getElementById('bra').addEventListener('click', function() {
  if (!confirm('Сбросить всё? Игры вернутся к стандартным.')) return;
  games = JSON.parse(JSON.stringify(DEFAULTS));
  owned = [];
  lsSet('rcol_g', games);
  lsSet('rcol_o', owned);
  renderCol(); renderAdmin('');
  showToast('Сброшено');
});

renderCol();
</script>
</body>
